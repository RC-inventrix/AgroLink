# =============================================================
# AgroLink - Production Docker Compose
# Optimized for Google Cloud VM (8 GB RAM)
# =============================================================

services:
  # ─────────────────────────────────────────
  # INFRASTRUCTURE LAYER
  # ─────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: agro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - agro-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  service-discovery:
    build:
      context: ./backend/service-discovery
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/service-discovery:${IMAGE_TAG}
    container_name: agro_discovery
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - agro-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  config-server:
    build:
      context: ./backend/config-server
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/config-server:${IMAGE_TAG}
    container_name: agro_config
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native
      EUREKA_HOST: service-discovery
    depends_on:
      service-discovery:
        condition: service_healthy
    networks:
      - agro-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ─────────────────────────────────────────
  # MICROSERVICES LAYER
  # ─────────────────────────────────────────

  identity-service:
    build:
      context: ./backend/identityAndUser-service
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/identity-service:${IMAGE_TAG}
    container_name: agro_identity
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      JWT_SECRET: ${JWT_KEY}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: service-discovery
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      JPA_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    networks:
      - agro-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  product-service:
    build:
      context: ./backend/productCatalog-service
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/product-service:${IMAGE_TAG}
    container_name: agro_products
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: service-discovery
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}
      JPA_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    networks:
      - agro-net
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.75"

  order-payment-service:
    build:
      context: ./backend/orderPayment-service
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/order-payment-service:${IMAGE_TAG}
    container_name: agro_orders
    restart: unless-stopped
    ports:
      - "8075:8075"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: service-discovery
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL}
      JWT_SECRET: ${JWT_KEY}
      JPA_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    networks:
      - agro-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8075/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  chat-service:
    build:
      context: ./backend/chat-service
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/chat-service:${IMAGE_TAG}
    container_name: agro_chat
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: service-discovery
      JWT_KEY: ${JWT_KEY}
      CHAT_AES_KEY: ${CHAT_AES_KEY}
      JPA_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    networks:
      - agro-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  auction-service:
    build:
      context: ./backend/auction-service
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/auction-service:${IMAGE_TAG}
    container_name: agro_auction
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: service-discovery
      JPA_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    networks:
      - agro-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  moderation-service:
    build:
      context: ./backend/moderation-service
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/moderation-service:${IMAGE_TAG}
    container_name: agro_moderation
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: service-discovery
      JWT_SECRET: ${JWT_KEY}
      JPA_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    networks:
      - agro-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8086/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.25"

  chatbot-service:
    build:
      context: ./backend/chatbot-service
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/chatbot-service:${IMAGE_TAG}
    container_name: agro_chatbot
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      EUREKA_HOST: service-discovery
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      service-discovery:
        condition: service_healthy
    networks:
      - agro-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.25"

  crop-recommendation-service:
    build:
      context: ./backend/crop-recommendation-service
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/crop-recommendation-service:${IMAGE_TAG}
    container_name: agro_crop_recommendation
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - agro-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/api-gateway:${IMAGE_TAG}
    container_name: agro_gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_HOST: service-discovery
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      service-discovery:
        condition: service_healthy
      identity-service:
        condition: service_started
      product-service:
        condition: service_started
    networks:
      - agro-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${IMAGE_TAG}
    container_name: agro_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_S3_HOSTNAME: ${NEXT_PUBLIC_S3_HOSTNAME}
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - agro-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

# ─────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  agro-net:
    driver: bridge
