name: AgroLink CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/agrolink

jobs:
  test-backend:
    name: Test Backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            java: '21'
          - service: auction-service
            java: '21'
          - service: chat-service
            java: '17'
          - service: chatbot-service
            java: '17'
          - service: config-server
            java: '21'
          - service: identityAndUser-service
            java: '21'
          - service: moderation-service
            java: '17'
          - service: orderPayment-service
            java: '21'
          - service: productCatalog-service
            java: '21'
          - service: service-discovery
            java: '21'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: backend/${{ matrix.service }}
        run: mvn test -B
        env:
          JWT_SECRET: test-jwt-secret-for-ci-only-not-real
          DB_USER: test
          DB_PASSWORD: test
          SPRING_MAIL_USERNAME: test@example.com
          SPRING_MAIL_PASSWORD: test
          AWS_ACCESS_KEY: AKIAIOSFODNN7EXAMPLE
          AWS_SECRET_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          AWS_BUCKET_NAME: test-bucket
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_PUBLIC_KEY: pk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          STRIPE_PRICE_ID: price_placeholder
          CHAT_AES_KEY: AgroLink12345678
          GEMINI_API_KEY: test-gemini-key

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-gateway
            context: backend/api-gateway
          - name: auction-service
            context: backend/auction-service
          - name: chat-service
            context: backend/chat-service
          - name: chatbot-service
            context: backend/chatbot-service
          - name: config-server
            context: backend/config-server
          - name: identity-service
            context: backend/identityAndUser-service
          - name: moderation-service
            context: backend/moderation-service
          - name: order-payment-service
            context: backend/orderPayment-service
          - name: product-service
            context: backend/productCatalog-service
          - name: service-discovery
            context: backend/service-discovery
          - name: crop-recommendation-service
            context: backend/crop-recommendation-service
          - name: frontend
            context: frontend
            build_args: NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8080' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/agrolink-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/agrolink

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.production.yml pull

            # Deploy with zero-downtime
            docker compose -f docker-compose.production.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            # Verify health
            echo "Waiting for services to become healthy..."
            sleep 30
            docker compose -f docker-compose.production.yml ps
