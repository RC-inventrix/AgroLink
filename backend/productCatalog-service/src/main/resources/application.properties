spring.application.name=productCatalog-service
server.port=8082

# --- DATABASE CONFIGURATION ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:agro_link_db}
spring.datasource.username=${DB_USER:agro_admin}
spring.datasource.password=${DB_PASSWORD:secure_agro_password_123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=product_schema

# --- AI FEATURE CONFIGURATION ---
openai.api.key=${OPENAI_API_KEY}

# --- EUREKA CONFIGURATION ---
eureka.client.serviceUrl.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/
eureka.instance.prefer-ip-address=true
spring.cloud.config.enabled=false

# ==========================================
# AWS CONFIGURATION (DUAL SETUP)
# ==========================================

# 1. For Spring Cloud AWS Library (Fixes "Unable to load region")
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
spring.cloud.aws.region.static=${AWS_REGION:ap-south-1}

# 2. For your S3Service.java Code (Fixes "Could not resolve placeholder")
aws.accessKeyId=${AWS_ACCESS_KEY}
aws.secretAccessKey=${AWS_SECRET_KEY}
aws.region=${AWS_REGION:ap-south-1}
aws.s3.bucketName=${AWS_BUCKET_NAME}

# ==========================================

# --- FILE UPLOAD SETTINGS ---
# ALLOW LARGE FILES
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB